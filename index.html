<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vet Tech Trainer</title>

<style>
body { font-family: Arial; max-width: 900px; margin: 40px auto; text-align: center; }
button { padding: 12px; margin: 6px; border-radius: 10px; border: none; cursor: pointer; }
.answer { display: block; width: 100%; background: #eee; margin: 8px 0; }
.correct { background: #4CAF50; color: white; }
.wrong { background: #f44336; color: white; }
.hidden { display: none; }
#question { font-size: 22px; margin: 20px 0; white-space: pre-line; }
#missedList { text-align:left; margin-top:20px; }
</style>
</head>

<body>

<h1>Vet Tech Trainer</h1>

<div id="menu">
<h2>Mode</h2>
<button onclick="setMode('confidence')">Confidence</button>
<button onclick="setMode('study')">Study</button>
<button onclick="setMode('exam')">Exam</button>

<h2>Category</h2>
<button onclick="startCategory('fluid')">Fluid</button>
<button onclick="startCategory('history')">History</button>
<button onclick="startCategory('emergency')">Emergency</button>
<button onclick="startMixed()">Full Exam</button>
</div>

<div id="game" class="hidden">
<h3 id="modeLabel"></h3>
<div id="progress"></div>
<div id="question"></div>
<div id="answers"></div>
<button onclick="nextQuestion()">Next</button>
<button onclick="home()">Home</button>
</div>

<div id="results" class="hidden">
<h2>Results</h2>
<div id="resultScore"></div>
<div id="resultPercent"></div>
<div id="resultStatus"></div>

<h3>Missed Questions</h3>
<ul id="missedList"></ul>

<button onclick="home()">Home</button>
</div>

<script>

// ================= STATE =================
let mode="exam";
let queue=[],current=null,qIndex=0,totalQ=0,score=0,missed=[];

// ================= QUESTIONS =================

// 25 FLUID
const fluid = Array.from({length:25}, (_,i)=>({
q:`Fluid Question ${i+1}`,
a:["Correct Answer","Wrong A","Wrong B","Wrong C"],
c:0
}));

// 25 HISTORY
const history = Array.from({length:25}, (_,i)=>({
q:`History Question ${i+1}`,
a:["Correct Answer","Wrong A","Wrong B","Wrong C"],
c:0
}));

// 25 EMERGENCY
const emergency = Array.from({length:25}, (_,i)=>({
q:`Emergency Question ${i+1}`,
a:["Correct Answer","Wrong A","Wrong B","Wrong C"],
c:0
}));

// ================= MODE =================
function setMode(m){
mode=m;
alert("Mode set to: "+m);
}

// ================= START =================
function startCategory(type){
if(type==="fluid") queue=[...fluid];
if(type==="history") queue=[...history];
if(type==="emergency") queue=[...emergency];
start();
}

function startMixed(){
queue=[...fluid,...history,...emergency];
start();
}

function start(){
shuffle(queue);
totalQ = queue.length;
qIndex = 0;
score = 0;
missed = [];

menu.classList.add("hidden");
results.classList.add("hidden");
game.classList.remove("hidden");

modeLabel.innerText = "Mode: " + mode;

showQuestion();
}

// ================= QUESTION =================
function showQuestion(){

if(qIndex >= queue.length){
showResults();
return;
}

current = queue[qIndex];

progress.innerText = `Question ${qIndex+1} of ${totalQ}`;
question.innerText = current.q;

answers.innerHTML = "";

let shuffled = current.a.map((a,i)=>({text:a,correct:i===current.c}))
.sort(()=>Math.random()-0.5);

shuffled.forEach(item=>{
let btn = document.createElement("button");
btn.innerText = item.text;
btn.className = "answer";
btn.onclick = ()=>handleAnswer(item.correct,btn,item.text);
answers.appendChild(btn);
});

}

// ================= ANSWER =================
function handleAnswer(correct,btn,text){

let buttons = document.querySelectorAll(".answer");
buttons.forEach(b=>b.disabled=true);

if(correct){
score++;
if(mode!=="exam") btn.classList.add("correct");
}else{
if(mode!=="exam") btn.classList.add("wrong");

missed.push({
question: current.q,
correctAnswer: current.a[current.c]
});
}

if(mode!=="exam"){
buttons.forEach(b=>{
if(b.innerText===current.a[current.c]){
b.classList.add("correct");
}
});
}

}

// ================= NEXT =================
function nextQuestion(){
qIndex++;
showQuestion();
}

// ================= RESULTS =================
function showResults(){

game.classList.add("hidden");
results.classList.remove("hidden");

let percent = Math.round((score/totalQ)*100);

resultScore.innerText = `Score: ${score} / ${totalQ}`;
resultPercent.innerText = `Percent: ${percent}%`;
resultStatus.innerText = percent>=70 ? "PASS" : "Needs Review";

missedList.innerHTML="";

missed.forEach(item=>{
let li=document.createElement("li");
li.innerHTML = `<strong>${item.question}</strong><br>Correct: ${item.correctAnswer}`;
missedList.appendChild(li);
});
}

// ================= UTIL =================
function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function home(){
location.reload();
}

</script>

</body>
</html>
