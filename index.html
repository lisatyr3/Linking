display:grid;
grid-template-columns:repeat(4,1fr);

}

.word{
padding:14px;
background:#e5e5e5;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

}

.correct{

}

button{

border:none;
border-radius:8px;

color:white;
font-size:16px;
cursor:pointer;
}

.message{
margin-top:15px;
font-weight:bold;
font-size:18px;
}

<p>Select 4 words that belong together.</p>

<div class="grid" id="grid"></div>

<button onclick="submitGroup()">Submit Group</button>

<div class="message" id="message"></div>

]

/* GAME */

let puzzle = puzzles[Math.floor(Math.random()*puzzles.length)];
let words = puzzle.groups.flat().sort(()=>Math.random()-0.5);
let selected = [];
let solved = [];

function draw(){
let gridHTML = "";

words.forEach(word=>{
let cls = "word";

if(selected.includes(word)) cls += " selected";
if(solved.includes(word)) cls += " correct";

gridHTML += `<div class="${cls}" onclick="toggle('${word}')">${word}</div>`;
});

document.getElementById("grid").innerHTML = gridHTML;
}

function toggle(word){
if(solved.includes(word)) return;

if(selected.includes(word)){
selected = selected.filter(w=>w!==word);
}else{
if(selected.length < 4){
selected.push(word);
}
}
draw();
}

function submitGroup(){

if(selected.length !== 4){
document.getElementById("message").textContent = "Select 4 words";
return;
}

let isCorrect = puzzle.groups.some(group =>
group.every(word => selected.includes(word))
);

if(isCorrect){

selected.forEach(w => solved.push(w));
selected = [];

if(solved.length === 16){
document.getElementById("message").innerHTML = `
🎉 You solved it!<br>
<button onclick="nextPuzzle()">Play Another Puzzle</button>
`;
}else{
document.getElementById("message").textContent = "Nice! Keep going";
}

}else{
document.getElementById("message").textContent = "Try again";
selected = [];
}

draw();
}

function nextPuzzle(){
puzzle = puzzles[Math.floor(Math.random()*puzzles.length)];
words = puzzle.groups.flat().sort(()=>Math.random()-0.5);
selected = [];
solved = [];
document.getElementById("message").textContent="";
draw();
}

draw();

</script>
