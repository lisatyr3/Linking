<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find the Link</title>

<style>
body{
  font-family: system-ui, -apple-system, sans-serif;
  background:#f3f4f4;
  padding:16px;
  margin:0;
}

.wrap{
  max-width: 550px;
  margin: auto;
  background: white;
  padding: 24px;
  border-radius: 24px;
  box-shadow: 0 4px 15px rgba(0,0,0,.08);
  text-align: center;
}

h1 { color: #2d8a78; margin: 0 0 4px; }
.sub { color: #666; margin: 0 0 20px; font-size: 0.95rem; }

/* The layout rows container for completed groups */
.solved-container {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}

.solved-row {
  padding: 16px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 0.9rem;
  letter-spacing: 0.5px;
}
/* Color difficulty tiers */
.tier-0 { background: #fbd043; color: #222; } /* Easy */
.tier-1 { background: #b5e37d; color: #222; } /* Medium */
.tier-2 { background: #b0c4de; color: #222; } /* Hard */
.tier-3 { background: #ba93df; color: #fff; } /* Tricky */

.grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:10px;
}

.word{
  aspect-ratio: 1 / 1;
  background:#efefe3;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
  word-break: break-word;
  user-select: none;
  transition: all 0.1s ease;
}

.word:hover { background: #e2e2d5; }

.selected{
  background:#5a5d64 !important;
  color:white;
}

.lives {
  margin: 18px 0;
  font-size: 0.95rem;
  font-weight: 600;
}
.dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  background: #2d8a78;
  border-radius: 50%;
  margin: 0 3px;
}
.dot.lost { background: #ddd; }

.actions {
  display: flex;
  gap: 10px;
  justify-content: center;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:24px;
  background:#2d8a78;
  color:white;
  font-size:15px;
  font-weight: bold;
  cursor:pointer;
}
button:disabled {
  background: #ccc !important;
  cursor: not-allowed;
  opacity: 0.6;
}
button.secondary {
  background: #e5e5e5;
  color: #333;
}
button.next-btn {
  background: #b5e37d;
  color: #222;
}

.message{
  margin-top:20px;
  font-weight:bold;
  font-size:16px;
  min-height: 24px;
}
</style>
</head>

<body>

<div class="wrap">

  <h1>Find the Link</h1>
  <p class="sub">Group words into 4 sets of 4 interconnected items!</p>

  <div id="solvedContainer" class="solved-container"></div>
  <div class="grid" id="grid"></div>

  <div class="lives" id="lives"></div>

  <div class="actions">
    <button id="submitBtn" onclick="submitGroup()">Submit Group</button>
    <button id="deselectBtn" class="secondary" onclick="deselectAll()">Deselect All</button>
    <button id="nextBtn" class="next-btn" onclick="nextPuzzle()" style="display: none;">Next Puzzle</button>
    <button id="retryBtn" class="next-btn" onclick="retryCurrentPuzzle()" style="display: none;">Try Again</button>
  </div>

  <div class="message" id="message"></div>

</div>

<script>

/* ===================================================================
   THE INFINITE MASTER CATEGORY LIBRARY
   =================================================================== */
const masterCategories = [
  { name: "Colors", words: ["RED", "BLUE", "GREEN", "ORANGE"] },
  { name: "Fruits", words: ["APPLE", "BANANA", "PEACH", "CHERRY"] },
  { name: "Musical Instruments", words: ["PIANO", "ORGAN", "FLUTE", "DRUM"] },
  { name: "Things with keys", words: ["KEYBOARD", "LOCK", "MAP", "CHORD"] },
  { name: "Types of Shoes", words: ["BOOT", "PUMP", "LOAFER", "SNEAKER"] },
  { name: "Things that pump", words: ["HEART", "BICYCLE", "GAS STATION", "IRON"] },
  { name: "Insects", words: ["ANT", "FLEA", "BEETLE", "CRICKET"] },
  { name: "Games with a ball", words: ["SOCCER", "TENNIS", "GOLF", "POOL"] },
  { name: "Tree Varieties", words: ["OAK", "PINE", "MAPLE", "CEDAR"] },
  { name: "Kitchen Utensils", words: ["SPOON", "FORK", "KNIFE", "WHISK"] },
  { name: "Weather Phenomena", words: ["RAIN", "SNOW", "HAIL", "SLEET"] },
  { name: "Capital Cities", words: ["PARIS", "LONDON", "TOKYO", "ROME"] },
  { name: "Types of Furniture", words: ["CHAIR", "TABLE", "COUCH", "DESK"] },
  { name: "Precious Gems", words: ["DIAMOND", "RUBY", "EMERALD", "SAPPHIRE"] },
  { name: "Types of Metal", words: ["GOLD", "SILVER", "COPPER", "IRON"] },
  { name: "Card Suits", words: ["HEART", "DIAMOND", "CLUB", "SPADE"] },
  { name: "String Instruments", words: ["VIOLIN", "CELLO", "GUITAR", "HARP"] },
  { name: "Things that fly", words: ["BIRD", "PLANE", "KITE", "ROCKET"] },
  { name: "Liquid Measures", words: ["OUNCE", "CUP", "PINT", "QUART"] },
  { name: "Types of Houses", words: ["CABIN", "CONDO", "MANSION", "COTTAGE"] },
  { name: "Parts of a Book", words: ["COVER", "PAGE", "CHAPTER", "INDEX"] }
];

/* GAME STATE */
let puzzle = { groups: [] };
let activeWords = [];
let selected = [];
let solvedGroups = [];
let mistakesLeft = 4;
let gameOver = false;

// Generates a completely new randomized puzzle configuration on the fly
function generateDynamicPuzzle() {
  // Shallow copy the array so we don't alter the original bank
  let pool = [...masterCategories];
  let selectedGroups = [];
  
  // Pull 4 random, distinct category blocks out of the bank
  for (let i = 0; i < 4; i++) {
    const randomIndex = Math.floor(Math.random() * pool.length);
    selectedGroups.push(pool[randomIndex]);
    pool.splice(randomIndex, 1); // Remove it so we don't select duplicates
  }
  
  puzzle = { groups: selectedGroups };
}

function initGame() {
  // Map out dynamic words
  activeWords = [];
  puzzle.groups.forEach(g => {
    g.words.forEach(w => activeWords.push(w));
  });
  
  // Shuffle layout smoothly
  activeWords.sort(() => Math.random() - 0.5);
  
  selected = [];
  solvedGroups = [];
  mistakesLeft = 4;
  gameOver = false;
  
  // Interface visibility clean setups
  document.getElementById("submitBtn").style.display = "inline-block";
  document.getElementById("deselectBtn").style.display = "inline-block";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("retryBtn").style.display = "none";
  
  document.getElementById("message").textContent = "";
  document.getElementById("message").style.color = "#333";
  
  draw();
}

// Generates a whole new set and boots it up
function nextPuzzle() {
  generateDynamicPuzzle();
  initGame();
}

// Restarts your exact current puzzle board state if you fail
function retryCurrentPuzzle() {
  initGame();
}

/* DRAW RENDERING LAYER */
function draw(){
  // 1. Render Solved Rows at top
  const solvedContainer = document.getElementById("solvedContainer");
  solvedContainer.innerHTML = "";
  
  solvedGroups.forEach((group, index) => {
    const row = document.createElement("div");
    row.className = `solved-row tier-${index}`;
    row.innerHTML = `<strong>${group.name}:</strong> ${group.words.join(", ")}`;
    solvedContainer.appendChild(row);
  });

  // 2. Render Remaining Interactive Active Words Grid
  let gridHTML = "";
  activeWords.forEach(word => {
    let cls = "word";
    if(selected.includes(word)) cls += " selected";
    gridHTML += `<div class="${cls}" onclick="toggle('${word}')">${word}</div>`;
  });
  document.getElementById("grid").innerHTML = gridHTML;

  // 3. Render Mistakes/Lives indicator
  let livesHTML = "Mistakes Remaining: ";
  for(let i=0; i<4; i++) {
    livesHTML += `<span class="dot ${i >= mistakesLeft ? 'lost' : ''}"></span>`;
  }
  document.getElementById("lives").innerHTML = livesHTML;
}

/* TRACK SELECTION STATES */
function toggle(word){
  if(gameOver) return;

  if(selected.includes(word)){
    selected = selected.filter(w => w !== word);
  } else {
    if(selected.length < 4){
      selected.push(word);
    }
  }
  draw();
}

function deselectAll() {
  if(gameOver) return;
  selected = [];
  draw();
}

/* MATCH SUBMIT LOGIC ENGINE */
function submitGroup(){
  if(gameOver) return;

  const msg = document.getElementById("message");
  msg.style.color = "#333";

  if(selected.length !== 4){
    msg.textContent = "Select exactly 4 words!";
    return;
  }

  // Look for exact matches against valid structural categories
  let matchedGroup = puzzle.groups.find(group => 
    group.words.every(w => selected.includes(w))
  );

  if(matchedGroup) {
    if(!solvedGroups.some(g => g.name === matchedGroup.name)) {
      solvedGroups.push(matchedGroup);
      
      activeWords = activeWords.filter(w => !selected.includes(w));
      selected = [];
      
      msg.textContent = "Awesome match found!";
      msg.style.color = "#146c2e";

      if(solvedGroups.length === 4){
        gameOver = true;
        msg.textContent = "🎉 Perfect Score! You solved it!";
        msg.style.color = "#146c2e";
        
        document.getElementById("submitBtn").style.display = "none";
        document.getElementById("deselectBtn").style.display = "none";
        document.getElementById("nextBtn").style.display = "inline-block";
      }
      
      draw();
      return;
    }
  }

  // Handle mistake states
  mistakesLeft--;
  msg.textContent = "Not quite a matching group. Try again!";
  msg.style.color = "#a11";
  selected = [];

  if(mistakesLeft <= 0) {
    gameOver = true;
    msg.textContent = "❌ Game Over! Better luck next time.";
    msg.style.color = "#a11";
    
    document.getElementById("submitBtn").style.display = "none";
    document.getElementById("deselectBtn").style.display = "none";
    document.getElementById("retryBtn").style.display = "inline-block";
  }

  draw();
}

// Global Execution Spark
generateDynamicPuzzle();
initGame();

</script>
</body>
</html>
