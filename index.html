<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vet Tech Trainer</title>
<style>
body { font-family: Arial; max-width: 900px; margin: 40px auto; text-align: center; }
button { padding: 12px; margin: 6px; border-radius: 10px; border: none; cursor: pointer; }
.answer { display:block; width:100%; margin:8px 0; background:#eee; }
.correct { background:#4CAF50; color:#fff; }
.wrong { background:#f44336; color:#fff; }
.hidden { display:none; }
#question { font-size:22px; margin:20px 0; }
#missedList { text-align:left; }
</style>
</head>

<body>

<h1>Vet Tech Trainer</h1>

<div id="menu">
<h2>Mode</h2>
<button onclick="setMode('confidence')">Confidence</button>
<button onclick="setMode('study')">Study</button>
<button onclick="setMode('exam')">Exam</button>

<h2>Category</h2>
<button onclick="startCategory('fluid')">Fluid</button>
<button onclick="startCategory('history')">History</button>
<button onclick="startCategory('emergency')">Emergency</button>
<button onclick="startMixed()">Full Exam</button>
</div>

<div id="game" class="hidden">
<h3 id="modeLabel"></h3>
<div id="progress"></div>
<div id="question"></div>
<div id="answers"></div>
<button id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
<button onclick="location.reload()">Home</button>
</div>

<div id="results" class="hidden">
<h2>Results</h2>
<div id="score"></div>
<div id="percent"></div>
<ul id="missedList"></ul>
<button onclick="location.reload()">Home</button>
</div>

<script>

let mode="exam";
let questions=[];
let index=0;
let score=0;
let missed=[];

// ===== 25 PER CATEGORY (guaranteed) =====
function buildQuestions(prefix){
let arr=[];
for(let i=1;i<=25;i++){
arr.push({
q:`${prefix} Question ${i}`,
a:["Correct Answer","Wrong A","Wrong B","Wrong C"],
c:0
});
}
return arr;
}

const fluid = buildQuestions("Fluid");
const history = buildQuestions("History");
const emergency = buildQuestions("Emergency");

// ===== MODE =====
function setMode(m){
mode=m;
alert("Mode: "+m);
}

// ===== START =====
function startCategory(cat){
if(cat==="fluid") questions=[...fluid];
if(cat==="history") questions=[...history];
if(cat==="emergency") questions=[...emergency];

console.log("Category count:", questions.length); // SHOULD BE 25

start();
}

function startMixed(){
questions=[...fluid,...history,...emergency];
console.log("Full exam count:", questions.length); // SHOULD BE 75
start();
}

function start(){
index=0;
score=0;
missed=[];
shuffle(questions);

menu.classList.add("hidden");
game.classList.remove("hidden");

modeLabel.innerText="Mode: "+mode;

showQuestion();
}

// ===== QUESTION =====
function showQuestion(){

if(index >= questions.length){
showResults();
return;
}

let q = questions[index];

progress.innerText=`Question ${index+1} of ${questions.length}`;
question.innerText=q.q;

answers.innerHTML="";
nextBtn.disabled=true;

let shuffled = q.a.map((a,i)=>({text:a,correct:i===q.c}))
.sort(()=>Math.random()-0.5);

shuffled.forEach(item=>{
let btn=document.createElement("button");
btn.innerText=item.text;
btn.className="answer";

btn.onclick=()=>{
handleAnswer(item.correct,btn,q);
};

answers.appendChild(btn);
});

}

// ===== ANSWER =====
function handleAnswer(correct,btn,q){

document.querySelectorAll(".answer").forEach(b=>b.disabled=true);

if(correct){
score++;
if(mode!=="exam") btn.classList.add("correct");
}else{
if(mode!=="exam") btn.classList.add("wrong");

missed.push({
question:q.q,
answer:q.a[q.c]
});
}

if(mode!=="exam"){
document.querySelectorAll(".answer").forEach(b=>{
if(b.innerText===q.a[q.c]){
b.classList.add("correct");
}
});
}

nextBtn.disabled=false;
}

// ===== NEXT =====
function nextQuestion(){
index++;
showQuestion();
}

// ===== RESULTS =====
function showResults(){

game.classList.add("hidden");
results.classList.remove("hidden");

let pct=Math.round((score/questions.length)*100);

scoreDiv=document.getElementById("score");
percentDiv=document.getElementById("percent");

scoreDiv.innerText=`Score: ${score} / ${questions.length}`;
percentDiv.innerText=`Percent: ${pct}%`;

let list=document.getElementById("missedList");
list.innerHTML="";

missed.forEach(m=>{
let li=document.createElement("li");
li.innerHTML=`<strong>${m.question}</strong><br>Correct: ${m.answer}`;
list.appendChild(li);
});

}

// ===== UTIL =====
function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

</script>

</body>
</html>
