<style>
body{
  font-family: system-ui, -apple-system, sans-serif;
  background:#f3f4f4;
  padding:16px;
  margin:0;
}

.wrap{
  max-width: 550px;
  margin: auto;
  background: white;
  padding: 24px;
  border-radius: 24px;
  box-shadow: 0 4px 15px rgba(0,0,0,.08);
  text-align: center;
}

h1 { color: #2d8a78; margin: 0 0 4px; }
.sub { color: #666; margin: 0 0 20px; font-size: 0.95rem; }

.solved-container {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}

.solved-row {
  padding: 16px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 0.9rem;
  letter-spacing: 0.5px;
}
.tier-0 { background: #fbd043; color: #222; } 
.tier-1 { background: #b5e37d; color: #222; } 
.tier-2 { background: #b0c4de; color: #222; } 
.tier-3 { background: #ba93df; color: #fff; } 

.grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:10px;
}

.word{
  aspect-ratio: 1 / 1;
  background:#efefe3;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
  word-break: break-word;
  user-select: none;
  transition: all 0.1s ease;
}

.word:hover { background: #e2e2d5; }

.selected{
  background:#5a5d64 !important;
  color:white;
}

.lives {
  margin: 18px 0;
  font-size: 0.95rem;
  font-weight: 600;
}
.dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  background: #2d8a78;
  border-radius: 50%;
  margin: 0 3px;
}
.dot.lost { background: #ddd; }

.actions {
  display: flex;
  gap: 10px;
  justify-content: center;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:24px;
  background:#2d8a78;
  color:white;
  font-size:15px;
  font-weight: bold;
  cursor:pointer;
}
button:disabled {
  background: #ccc !important;
  cursor: not-allowed;
  opacity: 0.6;
}
button.secondary {
  background: #e5e5e5;
  color: #333;
}

.countdown-box {
  margin-top: 15px;
  font-size: 0.95rem;
  color: #666;
  font-weight: bold;
}

.message{
  margin-top:20px;
  font-weight:bold;
  font-size:16px;
  min-height: 24px;
}
</style>
</head>

<body>

  <div id="solvedContainer" class="solved-container"></div>
  <div class="grid" id="grid"></div>

  <div class="lives" id="lives"></div>

  <div class="actions">
    <button id="submitBtn" onclick="submitGroup()">Submit Group</button>
    <button id="deselectBtn" class="secondary" onclick="deselectAll()">Deselect All</button>
    <button id="retryBtn" class="secondary" onclick="initGame()" style="display: none;">Try Again</button>
  </div>

  <div class="message" id="message"></div>
  <div id="countdownBox" class="countdown-box" style="display: none;">Next Daily Puzzle in: <span id="countdownTimer">00:00:00</span></div>

/* SEED-BASED RANDOM SYSTEM (FOR DAILY UNIQUENESS) */
function getSeedForToday() {
  const d = new Date();
  // Formulates a stable numerical ID string out of the Year, Month, and Calendar Date
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

// A stable random number generator based on a seed value
function seedRandom(seed) {
  const x = Math.sin(seed++) * 10000;
  return x - Math.floor(x);
}

/* GAME STATE */
let puzzle = { groups: [] };
let activeWords = [];
let selected = [];
let solvedGroups = [];
let mistakesLeft = 4;
let gameOver = false;
let countdownInterval = null;

function generateDailyPuzzle() {
  let todaySeed = getSeedForToday();
  let pool = [...masterCategories];
  let selectedGroups = [];
  
  // Pick 4 completely identical groups for anyone loading on this exact date calendar line
  for (let i = 0; i < 4; i++) {
    const pseudoRandomValue = seedRandom(todaySeed + i);
    const randomIndex = Math.floor(pseudoRandomValue * pool.length);
    selectedGroups.push(pool[randomIndex]);
    pool.splice(randomIndex, 1); 
  }
  
  puzzle = { groups: selectedGroups };
}

function initGame() {
  activeWords = [];
  puzzle.groups.forEach(g => {
    g.words.forEach(w => activeWords.push(w));
  });
  
  // Shuffling uses a secondary seed variations layout sequence so the layout is universally uniform today
  let shuffleSeed = getSeedForToday() + 42;
  activeWords.sort(() => {
    const r = seedRandom(shuffleSeed++);
    return r - 0.5;
  });
  
  selected = [];
  solvedGroups = [];
  mistakesLeft = 4;
  gameOver = false;
  
  document.getElementById("submitBtn").style.display = "inline-block";
  document.getElementById("deselectBtn").style.display = "inline-block";
  document.getElementById("retryBtn").style.display = "none";
  document.getElementById("countdownBox").style.display = "none";
  
  document.getElementById("message").textContent = "";
  document.getElementById("message").style.color = "#333";
  
  if (countdownInterval) clearInterval(countdownInterval);
  
  draw();
}

/* DRAW RENDERING LAYER */
function draw(){
  const solvedContainer = document.getElementById("solvedContainer");
  solvedContainer.innerHTML = "";
  
  solvedGroups.forEach((group, index) => {
    const row = document.createElement("div");
    row.className = `solved-row tier-${index}`;
    row.innerHTML = `<strong>${group.name}:</strong> ${group.words.join(", ")}`;
    solvedContainer.appendChild(row);
  });

  let gridHTML = "";
  activeWords.forEach(word => {
    let cls = "word";
    if(selected.includes(word)) cls += " selected";
    gridHTML += `<div class="${cls}" onclick="toggle('${word}')">${word}</div>`;
  });
  document.getElementById("grid").innerHTML = gridHTML;

  let livesHTML = "Mistakes Remaining: ";
  for(let i=0; i<4; i++) {
    livesHTML += `<span class="dot ${i >= mistakesLeft ? 'lost' : ''}"></span>`;
  }
  document.getElementById("lives").innerHTML = livesHTML;
}

/* TRACK SELECTION STATES */
function toggle(word){
  if(gameOver) return;

  if(selected.includes(word)){
    selected = selected.filter(w => w !== word);
  } else {
    if(selected.length < 4){
      selected.push(word);
    }
  }
  draw();
}

function deselectAll() {
  if(gameOver) return;
  selected = [];
  draw();
}

/* TIMEOUT COUNTDOWN INTERFACE RUNNER */
function startMidnightCountdown() {
  document.getElementById("countdownBox").style.display = "block";
  const timerDisplay = document.getElementById("countdownTimer");
  
  function updateTimer() {
    const now = new Date();
    const midnight = new Date();
    midnight.setHours(24, 0, 0, 0); // Sets exactly to upcoming midnight point
    
    const diff = midnight - now;
    if (diff <= 0) {
      clearInterval(countdownInterval);
      window.location.reload(); // Instantly hot-reloads the page when midnight ticks
      return;
    }
    
    let h = Math.floor(diff / (1000 * 60 * 60));
    let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    let s = Math.floor((diff % (1000 * 60)) / 1000);
    
    timerDisplay.textContent = `${h < 10 ? '0' : ''}${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
  }
  
  updateTimer();
  countdownInterval = setInterval(updateTimer, 1000);
}

/* MATCH SUBMIT LOGIC ENGINE */
function submitGroup(){
  if(gameOver) return;

  const msg = document.getElementById("message");
  msg.style.color = "#333";

  if(selected.length !== 4){
    msg.textContent = "Select exactly 4 words!";
    return;
  }

  let matchedGroup = puzzle.groups.find(group => 
    group.words.every(w => selected.includes(w))
  );

  if(matchedGroup) {
    if(!solvedGroups.some(g => g.name === matchedGroup.name)) {
      solvedGroups.push(matchedGroup);
      
      activeWords = activeWords.filter(w => !selected.includes(w));
      selected = [];
      
      msg.textContent = "Awesome match found!";
      msg.style.color = "#146c2e";

      if(solvedGroups.length === 4){
        gameOver = true;
        msg.textContent = "🎉 Perfect Score! You solved today's puzzle!";
        msg.style.color = "#146c2e";
        
        document.getElementById("submitBtn").style.display = "none";
        document.getElementById("deselectBtn").style.display = "none";
        startMidnightCountdown();
      }
      
      draw();
      return;
    }
  }

  mistakesLeft--;
  msg.textContent = "Not quite a matching group. Try again!";
  msg.style.color = "#a11";
  selected = [];

  if(mistakesLeft <= 0) {
    gameOver = true;
    msg.textContent = "❌ Game Over! Try again to solve today's link.";
    msg.style.color = "#a11";
    
    document.getElementById("submitBtn").style.display = "none";
    document.getElementById("deselectBtn").style.display = "none";
    document.getElementById("retryBtn").style.display = "inline-block";
    startMidnightCountdown();
  }

  draw();
}

// Spark First Load Config State Instantly
generateDailyPuzzle();
initGame();

</script>
